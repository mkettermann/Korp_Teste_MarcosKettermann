<hr>

<div class="flex f-s-b">
	<h3>Editar Produtos</h3>
	<a routerLink="/produtos" class="flex f-a-c f-s-15"><i class="bi bi-x"></i></a>
</div>
<form class="grid" (ngSubmit)="editarProduto()">
	<label>
		Código *
		<input name="codigo" [(ngModel)]="codigo" required />
	</label>
	<label>
		Descrição *
		<input name="descricao" [(ngModel)]="descricao" required />
	</label>
	<label>
		Saldo * (Disponível em estoque)
		<input name="saldo" [(ngModel)]="saldo" type="number" min="0" required />
	</label>
	<button type="submit"><i class="bi bi-pencil"></i> Atualizar Produto</button>
</form>
@if(erro()){
<p class="error">{{ erro()?.mensagem ?? 'Erro desconhecido' }}</p>
}
