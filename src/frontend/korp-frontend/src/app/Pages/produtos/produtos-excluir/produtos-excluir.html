<hr>
<div class="flex f-s-b">
	<h3>Confirmação de Exclusão</h3>
	<a routerLink="/produtos" class="flex f-a-c f-s-15"><i class="bi bi-x"></i></a>
</div>
<form class="grid" (ngSubmit)="excluirProduto()">
	<label>
		Código
		<div class="description">
			{{ codigo() }}
		</div>
	</label>
	<label>
		Descrição
		<div class="description">
			{{ descricao() }}
		</div>
	</label>
	<label>
		Saldo (Disponível em estoque)
		<div class="description">
			{{ saldo() }}
		</div>
	</label>
	<button type="submit" class="bg-danger">
		<i class="bi bi-trash"></i>
		Excluir Produto
	</button>
</form>
@if(erro()){
<p class="text-danger">{{ erro()?.mensagem ?? 'Erro desconhecido' }}</p>
}
