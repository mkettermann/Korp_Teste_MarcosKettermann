<section class="panel">
	<div class="panel-title">
		Produtos
		<div class="actions">
			<a routerLink="/produtos/novo" routerLinkActive="active">
				<i class="bi bi-plus"></i>
				Novo
			</a>
			<i class="bi bi-box-seam"></i>
		</div>
	</div>

	<router-outlet></router-outlet>

	<hr>
	@if(erro()){
	<p class="error">{{ erro()?.mensagem ?? 'Erro desconhecido' }}</p>
	}

	<h3>Listagem dos Produtos</h3>
	<table>
		<thead>
			<tr>
				<!-- <th>ID</th> -->
				<th>Código</th>
				<th>Descrição</th>
				<th>Saldo</th>
				<th class="col-action">Ações</th>
			</tr>
		</thead>
		<tbody>
			@for (produto of produtos(); track $index) {
			<tr>
				<!-- <td>{{ produto.id }}</td> -->
				<td>{{ produto.codigo }}</td>
				<td>{{ produto.descricao }}</td>
				<td>{{ produto.saldo }}</td>
				<td>
					<a routerLink="/produtos/editar/{{ produto.id }}" routerLinkActive="active">
						<i class="bi bi-pencil"></i>
						Editar
					</a>
				</td>
			</tr>
			}
		</tbody>
		<tfoot>
			<tr>
				<td colspan="5" class="text-right">Total de produtos: {{ produtos().length }}</td>
			</tr>
		</tfoot>
	</table>
</section>
